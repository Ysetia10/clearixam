<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#grad1)"/>
  
  <!-- Chart bars representing growth -->
  <g filter="url(#shadow)">
    <rect x="12" y="40" width="7" height="14" rx="1.5" fill="white" opacity="0.85"/>
    <rect x="22" y="33" width="7" height="21" rx="1.5" fill="white" opacity="0.9"/>
    <rect x="32" y="25" width="7" height="29" rx="1.5" fill="white" opacity="0.95"/>
    <rect x="42" y="16" width="7" height="38" rx="1.5" fill="white"/>
  </g>
  
  <!-- Success checkmark -->
  <g filter="url(#shadow)">
    <circle cx="52" cy="14" r="8" fill="#10B981"/>
    <path d="M 48 14 L 51 17 L 56 11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
