spring:
  application:
    name: clearixam
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/clearixam}
    username: ${DATABASE_USERNAME:yashansetia}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-this-in-production-must-be-at-least-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}
