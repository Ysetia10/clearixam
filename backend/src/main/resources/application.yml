spring:
  application:
    name: clearixam
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/clearixam}
    username: ${DATABASE_USERNAME:yashansetia}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8081}

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-minimum-256-bits-required}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: INFO
    com.clearixam: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
